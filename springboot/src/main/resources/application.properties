# ============================================
# AI客服配置
# ============================================
# 是否启用AI客服（true/false）
ai.enabled=false

# AI服务提供商：openai, baidu, alibaba, tencent
ai.provider=openai

# AI API密钥（根据不同的提供商填写对应的密钥）
# OpenAI: sk-xxx
# 百度文心: 需要API Key和Secret Key（在代码中实现获取token逻辑）
# 阿里通义: sk-xxx
# 腾讯混元: 需要SecretId和SecretKey（在代码中实现签名逻辑）
ai.api.key=

# AI API地址（可选，不填则使用默认地址）
# OpenAI: https://api.openai.com/v1/chat/completions
# 百度文心: https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/completions
# 阿里通义: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
# 腾讯混元: https://hunyuan.tencentcloudapi.com/
ai.api.url=

# AI模型名称
# OpenAI: gpt-3.5-turbo, gpt-4, gpt-4-turbo等
# 百度文心: ernie-bot, ernie-bot-turbo等
# 阿里通义: qwen-turbo, qwen-plus, qwen-max等
# 腾讯混元: hunyuan-lite, hunyuan-standard等
ai.model=gpt-3.5-turbo

# AI客服的系统用户ID（用于标识AI回复，需要先在数据库中创建对应的系统账号）
ai.service.id=1

# ============================================
# Redis配置（如果启用Redis缓存）
# ============================================
# Redis服务器地址
spring.data.redis.host=localhost
# Redis服务器端口
spring.data.redis.port=6379
# Redis密码（如果没有密码则留空）
spring.data.redis.password=
# 使用的数据库索引（默认0）
spring.data.redis.database=0
# 连接超时时间（毫秒）
spring.data.redis.timeout=5000ms
# Lettuce连接池配置
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms
